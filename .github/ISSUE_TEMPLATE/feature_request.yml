name: Feature request
description: Propose a capability or a closer match to Notion's interaction model.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow that is missing or awkward today.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: If this mirrors a Notion behavior, describe (or screenshot) how Notion does it.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
