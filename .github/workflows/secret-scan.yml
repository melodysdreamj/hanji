name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '41 18 * * 1'

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks public-tree scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Download and verify Gitleaks 8.30.1
        shell: bash
        run: |
          curl --fail --location --retry 3 \
            --output "$RUNNER_TEMP/gitleaks.tar.gz" \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  $RUNNER_TEMP/gitleaks.tar.gz" \
            | sha256sum --check --strict
          tar -xzf "$RUNNER_TEMP/gitleaks.tar.gz" -C "$RUNNER_TEMP" gitleaks
      - name: Scan the committed public tree
        shell: bash
        run: |
          scan_dir=$(mktemp -d)
          git archive --format=tar HEAD | tar -xf - -C "$scan_dir"
          "$RUNNER_TEMP/gitleaks" dir \
            --redact \
            --no-banner \
            --max-target-megabytes 10 \
            "$scan_dir"
