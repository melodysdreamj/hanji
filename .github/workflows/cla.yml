name: CLA Assistant

# Requires each first-time contributor to sign the Contributor License Agreement
# (docs/CLA.md) before their pull request can be merged. Contributors sign by
# posting a one-line comment on the PR; the bot records the signature.
#
# SETUP (one-time, by a repo admin — cannot be done from the repo files alone):
#   1. Create a classic Personal Access Token with the `repo` scope on an account
#      that can push to this repository.
#   2. Add it as a repository secret named `PERSONAL_ACCESS_TOKEN`
#      (Settings → Secrets and variables → Actions → New repository secret).
#   3. The bot stores signatures on the `cla-signatures` branch (created on first
#      signature). Nothing lands on `main`.
# `contributor-assistant/github-action` is pinned to a full commit SHA (with the
# human-readable version in a trailing comment), as the supply-chain guard
# requires. To bump it, resolve the new tag to its SHA
# (`gh api repos/contributor-assistant/github-action/commits/<tag> --jq .sha`)
# and update both the SHA and the comment.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >-
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Classic PAT with `repo` scope, stored as a repo secret (see header).
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/melodysdreamj/hanji/blob/main/docs/CLA.md'
          branch: 'cla-signatures'
          allowlist: 'melodysdreamj,*[bot]'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA — thank you!'
