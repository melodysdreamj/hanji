version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
    groups:
      backend-dependencies:
        patterns: ['*']

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    groups:
      web-dependencies:
        patterns: ['*']

  - package-ecosystem: npm
    directory: /mcp
    schedule:
      interval: weekly
    groups:
      mcp-dependencies:
        patterns: ['*']
