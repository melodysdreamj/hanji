# Auto-generated by edgebase
name = "notionlike-backend"
main = ".edgebase/runtime/server/src/index.ts"
compatibility_date = "2025-02-10"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [
  { name = "DATABASE", class_name = "DatabaseDO" },
  { name = "AUTH", class_name = "AuthDO" },
  { name = "DATABASE_LIVE", class_name = "DatabaseLiveDO" },
  { name = "ROOMS", class_name = "RoomsDO" },
  { name = "LOGS", class_name = "LogsDO" },
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DatabaseDO", "AuthDO", "DatabaseLiveDO", "RoomsDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["LogsDO"]

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "notionlike-backend-storage"

[[kv_namespaces]]
binding = "KV"
id = "local"

[[d1_databases]]
binding = "AUTH_DB"
database_name = "notionlike-backend-auth"
database_id = "local"

[[d1_databases]]
binding = "CONTROL_DB"
database_name = "notionlike-backend-control"
database_id = "local"


[assets]
directory = ".edgebase/runtime/server/app-assets"
binding = "ASSETS"
run_worker_first = true
