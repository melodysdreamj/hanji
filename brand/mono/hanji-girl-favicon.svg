      <path d="M120 322 C152 274, 216 274, 248 322"/>
      <path d="M264 322 C296 274, 360 274, 392 322"/>
    </g>
    <!-- 입술 -->
    <path d="M216 400 C232 380, 248 388, 256 394 C264 388, 280 380, 296 400
             C280 424, 232 424, 216 400 Z" fill="#0B0B0B"/>
