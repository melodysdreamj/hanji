<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 한지 소녀 파비콘 — 앞머리+눈+입술 클로즈업 (16px 생존용) -->
  <defs><clipPath id="r"><rect width="512" height="512" rx="116"/></clipPath></defs>
  <g clip-path="url(#r)">
    <rect width="512" height="512" fill="#FFFFFF"/>
    <!-- 앞머리 -->
    <path d="M0 0 H512 V156 C400 208, 112 208, 0 156 Z" fill="#0B0B0B"/>
    <!-- 감은 눈 -->
