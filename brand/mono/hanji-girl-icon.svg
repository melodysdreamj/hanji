<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 한지(Hanji) 소녀 — 흑백 K-pop 패션 일러스트 마크.
       왼쪽 머리핀 두 줄 = 문서의 텍스트 행 이스터에그 -->
  <rect width="512" height="512" rx="116" fill="#FFFFFF"/>

  <!-- 머리(보브): 단일 패스 — 돔 + 직선 사이드 + 안으로 말리는 밑단 -->
  <path fill="#0B0B0B" d="M124 220
    L124 372
    C124 398, 140 410, 160 408
    C176 406, 184 396, 186 382
    C196 392, 306 394, 326 382
    C328 396, 336 406, 352 408
    C372 410, 388 398, 388 372
    L388 220
    C388 140, 330 92, 256 92
    C182 92, 124 140, 124 220 Z"/>

  <!-- 얼굴 -->
  <path d="M180 236 C 210 250, 302 250, 332 236
           C 332 316, 306 362, 256 368
           C 206 362, 180 316, 180 236 Z" fill="#FFFFFF"/>

  <!-- 이목구비 -->
  <g fill="none" stroke="#0B0B0B" stroke-linecap="round">
    <!-- 눈썹 -->
    <path d="M206 266 C214 260, 226 260, 234 264" stroke-width="6"/>
    <path d="M278 264 C286 260, 298 260, 306 266" stroke-width="6"/>
    <!-- 감은 눈 -->
    <path d="M198 296 C208 282, 230 282, 240 296" stroke-width="11"/>
    <path d="M272 296 C282 282, 304 282, 314 296" stroke-width="11"/>
    <!-- 속눈썹 -->
    <path d="M198 296 L190 290" stroke-width="8"/>
    <path d="M314 296 L322 290" stroke-width="8"/>
    <!-- 코 -->
    <path d="M257 312 C254 320, 252 324, 250 328" stroke-width="6"/>
  </g>
  <!-- 입술 -->
  <path d="M240 346 C246 338, 252 341, 256 344 C260 341, 268 338, 272 346
           C266 356, 246 356, 240 346 Z" fill="#0B0B0B"/>

  <!-- 머리 윤기 하이라이트 -->
  <path d="M186 138 C218 110, 270 102, 308 114" fill="none"
        stroke="#FFFFFF" stroke-width="9" stroke-linecap="round"/>
  <!-- 머리핀 = 텍스트 두 행 -->
  <rect x="132" y="248" width="34" height="9" rx="4.5" fill="#FFFFFF"/>
  <rect x="132" y="266" width="24" height="9" rx="4.5" fill="#FFFFFF"/>
  <!-- 반짝임 -->
  <path d="M414 108 C418 124, 422 128, 438 132 C422 136, 418 140, 414 156
           C410 140, 406 136, 390 132 C406 128, 410 124, 414 108 Z" fill="#0B0B0B"/>
</svg>
