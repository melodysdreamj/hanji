<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>HANJI 소녀 마스코트 — 흑백 K-pop 컨셉</title>
<style>
  body { margin:0; font-family:-apple-system,"Apple SD Gothic Neo",sans-serif; background:#EFEFEF; color:#111; }
  header { padding:26px 32px 6px; }
  header h1 { font-size:20px; margin:0 0 6px; letter-spacing:.5px; }
  header p { margin:0; color:#666; font-size:13px; }
  section { margin:22px 32px; }
  section h2 { font-size:14px; margin:0 0 2px; letter-spacing:2px; }
  section p.desc { margin:0 0 12px; font-size:12.5px; color:#666; }
  .strips { display:flex; gap:14px; flex-wrap:wrap; }
  .strip { border-radius:12px; padding:18px 22px; display:flex; align-items:flex-end; gap:22px; flex:1; min-width:340px; }
  .strip.light { background:#FFFFFF; border:1px solid #DDD; }
  .strip.dark  { background:#0B0B0B; }
  .cell { text-align:center; }
  .cell small { display:block; margin-top:6px; font-size:10.5px; color:#999; }
  .wordmark { margin:22px 32px 40px; }
</style>
</head>
<body>
<header>
  <h1>HANJI — 소녀 마스코트 (흑백 K-pop 스타일)</h1>
  <p>한지(Hanji)는 종이이자 소녀의 이름. 왼쪽 머리핀 두 줄은 문서의 텍스트 행 이스터에그입니다.</p>
</header>
<div id="root"></div>

    <g transform="translate(24,18) scale(0.32)">
      <rect width="512" height="512" rx="116" fill="#FFFFFF"/>
      <path fill="#0B0B0B" d="M124 220 L124 372 C124 398, 140 410, 160 408 C176 406, 184 396, 186 382 C196 392, 306 394, 326 382 C328 396, 336 406, 352 408 C372 410, 388 398, 388 372 L388 220 C388 140, 330 92, 256 92 C182 92, 124 140, 124 220 Z"/>

      <g fill="none" stroke="#0B0B0B" stroke-linecap="round">
        <path d="M206 266 C214 260, 226 260, 234 264" stroke-width="6"/>
        <path d="M278 264 C286 260, 298 260, 306 266" stroke-width="6"/>
        <path d="M198 296 C208 282, 230 282, 240 296" stroke-width="11"/>
        <path d="M272 296 C282 282, 304 282, 314 296" stroke-width="11"/>
        <path d="M198 296 L190 290" stroke-width="8"/>
        <path d="M314 296 L322 290" stroke-width="8"/>
        <path d="M257 312 C254 320, 252 324, 250 328" stroke-width="6"/>
      </g>
      <path d="M240 346 C246 338, 252 341, 256 344 C260 341, 268 338, 272 346 C266 356, 246 356, 240 346 Z" fill="#0B0B0B"/>
      <path d="M186 138 C218 110, 270 102, 308 114" fill="none" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round"/>
      <rect x="132" y="248" width="34" height="9" rx="4.5" fill="#FFFFFF"/>
      <rect x="132" y="266" width="24" height="9" rx="4.5" fill="#FFFFFF"/>
    </g>
    <text x="220" y="126" font-size="72" letter-spacing="18" fill="#FFFFFF"
          font-family="Futura,'Avenir Next','Century Gothic',Montserrat,'Helvetica Neue',sans-serif"
          font-weight="500">HANJI</text>
  </svg>
</div>

<template id="tGirl">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="116" fill="#FFFFFF"/>
  <path fill="#0B0B0B" d="M124 220 L124 372 C124 398, 140 410, 160 408 C176 406, 184 396, 186 382 C196 392, 306 394, 326 382 C328 396, 336 406, 352 408 C372 410, 388 398, 388 372 L388 220 C388 140, 330 92, 256 92 C182 92, 124 140, 124 220 Z"/>
  <path d="M180 236 C 210 250, 302 250, 332 236 C 332 316, 306 362, 256 368 C 206 362, 180 316, 180 236 Z" fill="#FFFFFF"/>
  <g fill="none" stroke="#0B0B0B" stroke-linecap="round">
    <path d="M206 266 C214 260, 226 260, 234 264" stroke-width="6"/>
    <path d="M278 264 C286 260, 298 260, 306 266" stroke-width="6"/>
    <path d="M198 296 C208 282, 230 282, 240 296" stroke-width="11"/>
    <path d="M272 296 C282 282, 304 282, 314 296" stroke-width="11"/>
    <path d="M198 296 L190 290" stroke-width="8"/>
    <path d="M314 296 L322 290" stroke-width="8"/>
    <path d="M257 312 C254 320, 252 324, 250 328" stroke-width="6"/>

  <path d="M240 346 C246 338, 252 341, 256 344 C260 341, 268 338, 272 346 C266 356, 246 356, 240 346 Z" fill="#0B0B0B"/>
  <path d="M186 138 C218 110, 270 102, 308 114" fill="none" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round"/>

  <rect x="132" y="266" width="24" height="9" rx="4.5" fill="#FFFFFF"/>

</svg>
</template>

<template id="tGirlFav">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs><clipPath id="rf"><rect width="512" height="512" rx="116"/></clipPath></defs>
  <g clip-path="url(#rf)">
    <rect width="512" height="512" fill="#FFFFFF"/>
    <path d="M0 0 H512 V156 C400 208, 112 208, 0 156 Z" fill="#0B0B0B"/>
    <g fill="none" stroke="#0B0B0B" stroke-width="30" stroke-linecap="round">
      <path d="M120 322 C152 274, 216 274, 248 322"/>
      <path d="M264 322 C296 274, 360 274, 392 322"/>
    </g>
    <path d="M216 400 C232 380, 248 388, 256 394 C264 388, 280 380, 296 400 C280 424, 232 424, 216 400 Z" fill="#0B0B0B"/>
  </g>
</svg>
</template>

<script>
const concepts = [
  ["tGirl", "메인 마크", "보브컷의 한지. 감은 눈의 화보 무드, 머리핀 = 텍스트 두 행, 윤기 하이라이트와 반짝임."],
  ["tGirlFav", "파비콘 크롭", "앞머리 + 감은 눈 + 입술만 남긴 클로즈업. 16px 생존용."],
];
const root = document.getElementById("root");
for (const [tid, title, desc] of concepts) {
  const sec = document.createElement("section");
  sec.innerHTML = `<h2>${title}</h2><p class="desc">${desc}</p>`;
  const strips = document.createElement("div");
  strips.className = "strips";
  for (const mode of ["light", "dark"]) {
    const strip = document.createElement("div");
    strip.className = `strip ${mode}`;
    for (const size of [144, 64, 32]) {
      const cell = document.createElement("div");
      cell.className = "cell";
      const svg = document.getElementById(tid).content.firstElementChild.cloneNode(true);
      svg.setAttribute("width", size);
      svg.setAttribute("height", size);
      cell.appendChild(svg);
      const label = document.createElement("small");
      label.textContent = size + "px";
      cell.appendChild(label);
      strip.appendChild(cell);
    }
    strips.appendChild(strip);
  }
  sec.appendChild(strips);
  root.appendChild(sec);
}
</script>
</body>
</html>
