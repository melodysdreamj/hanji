<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Hanji app icon: 한지 창호(문살) 격자 + 낙관 -->
  <defs>
    <filter id="fiber" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.28" numOctaves="2" seed="11"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.27  0 0 0 0 0.22  0 0 0 0 0.15  0 0 0 0.9 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- 한지 바탕 -->
  <rect width="512" height="512" rx="116" fill="#F5EEDC"/>
  <!-- 종이 섬유 결 -->
  <rect width="512" height="512" rx="116" filter="url(#fiber)" opacity="0.10"/>
  <!-- 배접 안쪽 선 -->
  <rect x="12" y="12" width="488" height="488" rx="106" fill="none" stroke="#E3D6B8" stroke-width="3"/>

  <!-- 창틀 -->
  <rect x="68" y="68" width="376" height="376" rx="24" fill="none" stroke="#453927" stroke-width="16"/>
  <!-- 문살 (井字살) -->
  <path d="M162 76 V436 M256 76 V436 M350 76 V436 M76 162 H436 M76 256 H436 M76 350 H436"
        stroke="#453927" stroke-width="9" fill="none"/>

  <!-- 낙관 -->
  <g transform="rotate(-6 393 393)">
    <rect x="362" y="362" width="62" height="62" rx="12" fill="#B13A2A"/>
    <rect x="378" y="378" width="30" height="30" rx="5" fill="none" stroke="#F5EEDC" stroke-width="5.5"/>
  </g>
</svg>
