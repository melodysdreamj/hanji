  </style>
  <rect class="paper" width="32" height="32" rx="7"/>
  <rect class="ink" x="5" y="5" width="22" height="22" rx="3" fill="none" stroke-width="2.4"/>
  <path class="ink" d="M16 5 V27 M5 16 H27" fill="none" stroke-width="2.4"/>
  <rect class="seal" x="18.8" y="18.8" width="6.8" height="6.8" rx="1.7" transform="rotate(-6 22.2 22.2)"/>
