<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Hanji favicon: 16~64px 대응 단순화 버전, OS 다크모드 자동 전환 -->
  <style>
    .paper { fill: #F5EEDC; }
    .ink   { stroke: #453927; }
    .seal  { fill: #B13A2A; }
    @media (prefers-color-scheme: dark) {
      .paper { fill: #221C12; }
