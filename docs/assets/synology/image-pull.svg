<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Synology registry image selection wireframe</title>
  <desc id="desc">A generic Synology-style registry screen selects the Hanji Docker Hub image and immutable alpha version tag for AMD64 or ARM64.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#18314f" flood-opacity=".16"/>
    </filter>
    <style>
      .ui { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .value { fill: #24364b; font-size: 25px; font-weight: 700; }
      .tag { fill: #137be6; font-size: 20px; font-weight: 700; }
      .small { fill: #62748a; font-size: 16px; font-weight: 650; }
      .callout { fill: #137be6; }
      .callout-text { fill: white; font-size: 20px; font-weight: 750; text-anchor: middle; dominant-baseline: central; }
    </style>
  </defs>
  <rect width="1200" height="620" rx="30" fill="#f2f6fb"/>
  <g class="ui" filter="url(#shadow)">
    <rect x="70" y="48" width="1060" height="524" rx="18" fill="white"/>
    <rect x="70" y="48" width="246" height="524" rx="18" fill="#f7f9fc"/>
    <rect x="100" y="90" width="142" height="16" rx="8" fill="#9baabd"/>
    <rect x="100" y="156" width="176" height="46" rx="10" fill="#e2edf8"/>
    <rect x="120" y="171" width="116" height="14" rx="7" fill="#609ed7"/>
    <rect x="100" y="220" width="146" height="13" rx="7" fill="#c0cad5"/>
    <rect x="100" y="258" width="124" height="13" rx="7" fill="#c0cad5"/>
    <path d="M298 48h814a18 18 0 0 1 18 18v76H298z" fill="#147de1"/>
    <rect x="338" y="82" width="232" height="16" rx="8" fill="#d6eaff"/>
    <rect x="354" y="176" width="696" height="66" rx="12" fill="white" stroke="#137be6" stroke-width="3"/>
    <circle cx="392" cy="209" r="14" fill="none" stroke="#7b8da2" stroke-width="4"/>
    <path d="m402 219 13 13" stroke="#7b8da2" stroke-width="4" stroke-linecap="round"/>
    <text x="442" y="218" class="value">melodysdreamj/hanji</text>
    <rect x="354" y="270" width="696" height="166" rx="14" fill="#f9fbfd" stroke="#d8e2ed" stroke-width="2"/>
    <g transform="translate(386 304)">
      <path d="M0 14h66v43a11 11 0 0 1-11 11H11A11 11 0 0 1 0 57z" fill="#147de1"/>
      <rect x="8" y="0" width="12" height="12" rx="2" fill="#83c5ff"/>
      <rect x="25" y="0" width="12" height="12" rx="2" fill="#83c5ff"/>
      <rect x="42" y="0" width="12" height="12" rx="2" fill="#83c5ff"/>
      <path d="M9 47c14 9 32 9 47-1" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
    </g>
    <text x="482" y="334" class="value">melodysdreamj/hanji</text>
    <rect x="482" y="358" width="218" height="46" rx="23" fill="#e7f2ff"/>
    <text x="508" y="388" class="tag">0.1.0-alpha.2</text>
    <rect x="724" y="358" width="106" height="46" rx="23" fill="#edf3f9"/>
    <text x="748" y="387" class="small">AMD64</text>
    <rect x="842" y="358" width="104" height="46" rx="23" fill="#edf3f9"/>
    <text x="868" y="387" class="small">ARM64</text>
    <rect x="354" y="470" width="262" height="62" rx="31" fill="#147de1"/>
    <path d="M410 501h150" stroke="#d7ebff" stroke-width="11" stroke-linecap="round"/>
    <circle cx="1018" cy="166" r="22" class="callout"/>
    <text x="1018" y="166" class="callout-text">1</text>
    <circle cx="696" cy="350" r="22" class="callout"/>
    <text x="696" y="350" class="callout-text">2</text>
  </g>
</svg>
