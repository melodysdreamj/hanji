<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Synology container port mapping wireframe</title>
  <desc id="desc">A generic Synology-style port table maps a fixed NAS host port 18787 to Hanji container port 8787 over TCP.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#18314f" flood-opacity=".16"/>
    </filter>
    <style>
      .ui { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .value { fill: #24364b; font-size: 27px; font-weight: 700; }
      .label { fill: #738399; font-size: 17px; font-weight: 650; letter-spacing: .08em; }
      .callout { fill: #137be6; }
      .callout-text { fill: white; font-size: 20px; font-weight: 750; text-anchor: middle; dominant-baseline: central; }
    </style>
  </defs>
  <rect width="1200" height="620" rx="30" fill="#f2f6fb"/>
  <g class="ui" filter="url(#shadow)">
    <rect x="70" y="48" width="1060" height="524" rx="18" fill="white"/>
    <rect x="70" y="48" width="246" height="524" rx="18" fill="#f7f9fc"/>
    <path d="M298 48h814a18 18 0 0 1 18 18v74H298z" fill="#147de1"/>
    <rect x="338" y="82" width="232" height="16" rx="8" fill="#d6eaff"/>
    <rect x="100" y="90" width="142" height="16" rx="8" fill="#9baabd"/>
    <rect x="100" y="156" width="176" height="46" rx="10" fill="#e2edf8"/>
    <rect x="120" y="171" width="116" height="14" rx="7" fill="#609ed7"/>
    <rect x="100" y="220" width="146" height="13" rx="7" fill="#c0cad5"/>
    <rect x="100" y="258" width="124" height="13" rx="7" fill="#c0cad5"/>
    <rect x="348" y="186" width="726" height="62" rx="12" fill="#edf3f9"/>
    <text x="386" y="222" class="label">NAS</text>
    <text x="642" y="222" class="label">CONTAINER</text>
    <text x="930" y="222" class="label">TYPE</text>
    <rect x="348" y="262" width="726" height="112" rx="12" fill="#f9fbfd" stroke="#d8e2ed" stroke-width="2"/>
    <rect x="378" y="284" width="210" height="66" rx="10" fill="white" stroke="#137be6" stroke-width="3"/>
    <text x="422" y="327" class="value">18787</text>
    <path d="M606 317h44" stroke="#137be6" stroke-width="4" stroke-linecap="round"/>
    <path d="m640 306 14 11-14 11" fill="none" stroke="#137be6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="674" y="284" width="174" height="66" rx="10" fill="white" stroke="#b5c3d2" stroke-width="2"/>
    <text x="718" y="327" class="value">8787</text>
    <rect x="892" y="284" width="150" height="66" rx="10" fill="white" stroke="#b5c3d2" stroke-width="2"/>
    <text x="935" y="327" class="value">TCP</text>
    <g transform="translate(388 416)">
      <rect width="616" height="88" rx="14" fill="#eaf3fc"/>
      <circle cx="48" cy="44" r="23" fill="#147de1"/>
      <path d="M37 45h22M48 34v22" stroke="white" stroke-width="4" stroke-linecap="round"/>
      <rect x="88" y="25" width="244" height="14" rx="7" fill="#84a4c2"/>
      <rect x="88" y="51" width="394" height="11" rx="6" fill="#b5c7d8"/>
      <rect x="514" y="25" width="68" height="38" rx="19" fill="#31ae75"/>
      <circle cx="563" cy="44" r="14" fill="white"/>
    </g>
    <circle cx="574" cy="273" r="22" class="callout"/>
    <text x="574" y="273" class="callout-text">1</text>
    <circle cx="836" cy="273" r="22" class="callout"/>
    <text x="836" y="273" class="callout-text">2</text>
    <circle cx="1030" cy="273" r="22" class="callout"/>
    <text x="1030" y="273" class="callout-text">3</text>
  </g>
</svg>
